name: release

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["distribution-spec/**"]

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:        
          submodules: true
      - name: Setup QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a #v4.0.0
      - name: Setup Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 #v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare
        id: prep
        run: |
          cd ./distribution-spec/conformance
          VERSION=$(git rev-parse --short HEAD)
          git apply ../../mirror.patch
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      - name: Generate images meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 #v5.10.0
        with:
          images: ghcr.io/spegel-org/conformance
          tags: type=raw,value=${{ steps.prep.outputs.VERSION }}
      - name: Publish multi-arch image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 #v6.19.2
        id: build
        with:
          push: true
          builder: ${{ steps.buildx.outputs.name }}
          context: ./distribution-spec/conformance
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/spegel-org/conformance:${{ steps.prep.outputs.VERSION }}
          labels: ${{ steps.meta.outputs.labels }}
